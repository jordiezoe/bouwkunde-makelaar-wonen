[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — alle paden naar index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker mag niet gecached worden (anders krijg je geen updates)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Statische assets met content hash mogen lang gecached worden
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
