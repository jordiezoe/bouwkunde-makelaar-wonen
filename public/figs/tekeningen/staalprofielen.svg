<svg viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="230" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Staal­profielen — doorsnede</text>
  <style>
    .st{fill:#94a3b8;stroke:#475569;stroke-width:1.5;stroke-linejoin:round}
    .nm{font-size:13px;font-weight:700;fill:#0f172a}
    .ds{font-size:10.5px;fill:#64748b}
  </style>

  <!-- IPE: smalle I -->
  <g transform="translate(40,55)">
    <path class="st" d="M6,0 H54 V12 H36 V78 H54 V90 H6 V78 H24 V12 H6 Z"/>
    <text class="nm" x="30" y="116" text-anchor="middle">IPE</text>
    <text class="ds" x="30" y="132" text-anchor="middle">smalle I-ligger</text>
  </g>

  <!-- HEA: brede H -->
  <g transform="translate(160,55)">
    <path class="st" d="M2,0 H78 V12 H50 V78 H78 V90 H2 V78 H30 V12 H2 Z"/>
    <text class="nm" x="40" y="116" text-anchor="middle">HEA / HEB</text>
    <text class="ds" x="40" y="132" text-anchor="middle">brede H-ligger / kolom</text>
  </g>

  <!-- UNP: U-profiel -->
  <g transform="translate(300,55)">
    <path class="st" d="M0,0 H50 V12 H16 V78 H50 V90 H0 Z"/>
    <text class="nm" x="25" y="116" text-anchor="middle">UNP</text>
    <text class="ds" x="25" y="132" text-anchor="middle">U-profiel</text>
  </g>

  <!-- L: hoekstaal -->
  <g transform="translate(400,55)">
    <path class="st" d="M0,0 H14 V76 H60 V90 H0 Z"/>
    <text class="nm" x="30" y="116" text-anchor="middle">L</text>
    <text class="ds" x="30" y="132" text-anchor="middle">hoekstaal</text>
  </g>

  <!-- koker -->
  <g transform="translate(500,55)">
    <path class="st" d="M0,0 H72 V90 H0 Z M12,12 V78 H60 V12 Z" fill-rule="evenodd"/>
    <text class="nm" x="36" y="116" text-anchor="middle">Koker</text>
    <text class="ds" x="36" y="132" text-anchor="middle">vierkant/rechthoek</text>
  </g>

  <!-- buis -->
  <g transform="translate(610,55)">
    <path class="st" d="M45,45 m-45,0 a45,45 0 1,0 90,0 a45,45 0 1,0 -90,0 Z M45,45 m-31,0 a31,31 0 1,1 62,0 a31,31 0 1,1 -62,0 Z" fill-rule="evenodd"/>
    <text class="nm" x="45" y="116" text-anchor="middle">Buis</text>
    <text class="ds" x="45" y="132" text-anchor="middle">rond (CHS)</text>
  </g>

  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#64748b">Bij liggers (buiging) zit het meeste materiaal in de flenzen — ver van de neutrale lijn — voor maximale stijfheid bij minimaal gewicht.</text>
</svg>
