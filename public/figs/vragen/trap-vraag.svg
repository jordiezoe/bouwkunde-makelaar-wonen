  <!-- maat B: aantrede (horizontaal) -->
  <g stroke="#2563eb" stroke-width="1.5" fill="none">
    <line x1="108" y1="58" x2="152" y2="58"/>
    <path d="M114,54 L108,58 L114,62"/>
