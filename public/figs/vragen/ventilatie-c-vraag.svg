  <path d="M40,155 V75 L150,22 L260,75 V155 Z" fill="#f8fafc" stroke="#334155" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="40" y1="118" x2="260" y2="118" stroke="#334155" stroke-width="1.2"/>
  <!-- natuurlijke toevoer: roosters in gevel met blauwe pijlen naar binnen -->
  <g stroke="#2563eb" stroke-width="2.2" fill="none">
    <line x1="14" y1="96" x2="56" y2="96"/><path d="M48,90 L58,96 L48,102"/>
    <line x1="14" y1="136" x2="56" y2="136"/><path d="M48,130 L58,136 L48,142"/>
  </g>
  <rect x="37" y="92" width="6" height="9" fill="#2563eb"/>
  <rect x="37" y="132" width="6" height="9" fill="#2563eb"/>
  <!-- mechanische afvoer: ventilatorbox op dak met kanaal -->
  <rect x="196" y="42" width="26" height="18" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <circle cx="209" cy="51" r="6" fill="none" stroke="#334155" stroke-width="1.3"/>
  <line x1="205" y1="47" x2="213" y2="55" stroke="#334155" stroke-width="1.3"/>
  <line x1="213" y1="47" x2="205" y2="55" stroke="#334155" stroke-width="1.3"/>
  <line x1="209" y1="60" x2="209" y2="118" stroke="#334155" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="209" y1="118" x2="209" y2="148" stroke="#334155" stroke-width="1.3" stroke-dasharray="4 3"/>
  <!-- afvoerpijl rood omhoog uit de box -->
  <g stroke="#dc2626" stroke-width="2.2" fill="none">
    <line x1="209" y1="40" x2="209" y2="12"/><path d="M203,20 L209,10 L215,20"/>
  </g>
  <!-- afzuigpunten -->
  <circle cx="209" cy="118" r="4" fill="#dc2626"/>
  <circle cx="209" cy="148" r="4" fill="#dc2626"/>
</svg>
