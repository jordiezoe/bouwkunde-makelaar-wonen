<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Arial, sans-serif">
  <rect x="0" y="0" width="300" height="180" fill="#ffffff"/>
  <line x1="10" y1="155" x2="290" y2="155" stroke="#cbd5e1" stroke-width="1"/>
  <!-- woning-doorsnede -->
  <path d="M40,155 V75 L150,22 L260,75 V155 Z" fill="#f8fafc" stroke="#334155" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="40" y1="118" x2="260" y2="118" stroke="#334155" stroke-width="1.2"/>
  <!-- WTW-unit op zolder met warmtewisselaar-kruis -->
  <rect x="130" y="48" width="40" height="28" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <line x1="134" y1="52" x2="166" y2="72" stroke="#334155" stroke-width="1.3"/>
  <line x1="166" y1="52" x2="134" y2="72" stroke="#334155" stroke-width="1.3"/>
  <!-- buitenlucht in (blauw) en binnenlucht uit (rood) via het dak -->
  <g stroke="#2563eb" stroke-width="2.2" fill="none">
    <line x1="138" y1="14" x2="138" y2="46"/><path d="M132,38 L138,48 L144,38"/>
  </g>
  <g stroke="#dc2626" stroke-width="2.2" fill="none">
    <line x1="162" y1="46" x2="162" y2="14"/><path d="M156,22 L162,12 L168,22"/>
  </g>
  <!-- kanalen: toevoer (blauw) naar verblijfsruimte, afvoer (rood) uit keuken/bad -->
  <line x1="138" y1="76" x2="138" y2="98" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="138" y1="98" x2="80" y2="98" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 3"/>
  <g stroke="#2563eb" stroke-width="2" fill="none">
    <line x1="80" y1="98" x2="80" y2="110"/><path d="M75,103 L80,112 L85,103"/>
  </g>
  <line x1="162" y1="76" x2="162" y2="98" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="162" y1="98" x2="222" y2="98" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <g stroke="#dc2626" stroke-width="2" fill="none">
    <line x1="222" y1="112" x2="222" y2="100"/><path d="M217,107 L222,98 L227,107"/>
  </g>
  <circle cx="222" cy="114" r="4" fill="#dc2626"/>
  <circle cx="80" cy="114" r="4" fill="#2563eb"/>
</svg>
